# JBoss Logging Configuration
# This configuration is used when jboss-logging is the underlying logging framework
# Root logger level
org.jboss.logging.Logger.rootLogger=INFO
# Console handler
org.jboss.logging.Logger.handler.CONSOLE=org.jboss.logmanager.handlers.ConsoleHandler
org.jboss.logging.Logger.handler.CONSOLE.level=INFO
org.jboss.logging.Logger.handler.CONSOLE.formatter=PATTERN
# Pattern formatter
org.jboss.logging.Logger.formatter.PATTERN=org.jboss.logmanager.formatters.PatternFormatter
org.jboss.logging.Logger.formatter.PATTERN.pattern=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n